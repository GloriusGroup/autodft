# ==========================================================================
# AutoDFT framework defaults.
#
# Do not edit this file for production deployments — copy one of the example
# configs (e.g. reaction.toml) and override values there. The loader applies
# user configs on top of these defaults; env vars (AUTODFT_*) override both.
# ==========================================================================

[database]
# When unset, the loader uses sqlite:///<storage.data_path>/autodft.db
# url = "sqlite:///autodft.db"

[storage]
# Single root directory. The loader places autodft.db, comp_data/, and
# export_data/ under it (each can still be overridden below).
data_path = "/data/autodft"
# comp_data_path   = "/data/autodft/comp_data"
# export_data_path = "/data/autodft/export_data"

[pipeline]
max_simultaneous_entrypoints = 40
# SLURM queue slots per unit of entrypoint priority (priority 1 -> 10 waiting
# jobs). This is the only throttle on submission.
queue_slots_per_priority = 10
max_unsubmitted_jobs = 500
loop_interval_seconds = 30
max_attempts = 3

[pipeline.confsearch]
time_limit = "2-00:00:00"
default_nprocs = 48
default_mem_per_core = 1500

[pipeline.optimization]
time_limit = "2-12:00:00"
default_nprocs = 16
default_mem_per_core = 4000
max_iter = 1000
displacement = 0.1

[pipeline.singlepoint]
time_limit = "1-00:00:00"
default_nprocs = 16
default_mem_per_core = 4000

[pipeline.retry]
increased_time_limit = "4-00:00:00"
increased_nprocs = 32
increased_mem_per_core = 4000

[slurm]
partition = "CPU"
nice = 1000

[orca]
# Override these in your deployment config (see reaction.toml for example).
path       = "orca"
extra_args = ""
# nbo_exe  = "/path/to/nbo7.i8.exe"
tmp_dir    = "/tmp"

[api]
enabled = true
host = "0.0.0.0"
port = 8080

[security]
dashboard_password       = "password"
session_lifetime_seconds = 604800
