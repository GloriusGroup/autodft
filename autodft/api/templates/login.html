<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDFT — Sign in</title>
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #21242f;
            --bg-input: #2a2d3a;
            --border: #2e3140;
            --text-primary: #e4e6eb;
            --text-secondary: #9ca0ab;
            --text-muted: #6b7080;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 32px 36px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }
        h1 span { color: var(--accent); }
        .sub {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        input[type="password"], input[type="text"] {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 11px 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus, input[type="text"]:focus {
            border-color: var(--accent);
        }
        button {
            margin-top: 16px;
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 11px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: var(--accent-hover); }
        .error {
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            background: var(--red-bg);
            color: var(--red);
            font-size: 0.85rem;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .hint {
            margin-top: 18px;
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .hint code {
            background: var(--bg-input);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'SF Mono','Fira Code','Consolas',monospace;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Auto<span>DFT</span></h1>
        <div class="sub">Sign in to access the dashboard</div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <input type="hidden" name="next" value="{{ next or '/' }}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username"
                   autocapitalize="none" spellcheck="false" autofocus required>
            <label for="password">API key</label>
            <input type="password" id="password" name="password"
                   autocomplete="current-password" required>
            <button type="submit">Sign in</button>
        </form>

        <div class="hint">
            Your API key is the same credential your scripts send in the
            <code>X-AutoDFT-API-Key</code> header. Ask an administrator if
            you do not have one, or if yours needs rotating.
        </div>
    </div>
</body>
</html>
